<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI转Word助手 — 让AI文案一键变成规范Word文档</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <div class="logo-icon">W</div>
                <div>
                    <div class="logo-text">AI转Word助手</div>
                </div>
            </div>
            <div class="header-controls">
                <button class="icon-btn" id="theme-cycle" title="切换主题 (Ctrl+1/2/3)">
                    <span id="theme-icon">🌙</span>
                </button>
                <button class="icon-btn" id="template-settings" title="模板设置">⚙️</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="app-main">
            <!-- Left Panel: Input -->
            <div class="panel input-panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <span class="icon">📝</span>
                        输入AI文案
                    </div>
                    <div class="input-actions">
                        <button class="btn btn-secondary" id="clear-btn">🗑️ 清除</button>
                        <button class="btn btn-secondary" id="paste-btn">📋 粘贴</button>
                        <button class="btn btn-secondary" id="upload-btn">📁 上传</button>
                        <button class="btn btn-secondary" id="batch-upload-btn" title="批量上传多个文件">📦 批量</button>
                        <input type="file" id="file-input" accept=".txt,.md,.html" hidden>
                        <input type="file" id="batch-file-input" accept=".txt,.md,.html" multiple hidden>
                    </div>
                </div>
                <div class="panel-body">
                    <!-- Drag & Drop Zone -->
                    <div class="drop-zone" id="drop-zone">
                        <div class="drop-zone-icon">📂</div>
                        <div class="drop-zone-text">拖拽文件到此处，或点击上传</div>
                        <div class="drop-zone-hint">支持 .txt · .md · .docx · .html</div>
                    </div>

                    <!-- Markdown Input -->
                    <textarea
                        id="markdown-input"
                        class="markdown-input"
                        placeholder="在此粘贴AI生成的文案（Markdown格式）...&#10;&#10;示例：&#10;# 文档标题&#10;&#10;这是一段正文内容，支持**加粗**、*斜体*等格式。&#10;&#10;## 二级标题&#10;&#10;- 列表项一&#10;- 列表项二"
                    ></textarea>

                    <!-- Mode Selector -->
                    <div class="mode-section">
                        <h3>🔄 转换模式</h3>
                        <div class="mode-options" id="mode-options">
                            <label class="mode-option">
                                <input type="radio" name="mode" value="purify" checked>
                                <div class="mode-icon">✨</div>
                                <div class="mode-label">净化模式</div>
                                <div class="mode-desc">清除AI特殊符号<br>多余空行</div>
                            </label>
                            <label class="mode-option">
                                <input type="radio" name="mode" value="rearrange">
                                <div class="mode-icon">📐</div>
                                <div class="mode-label">重排模式</div>
                                <div class="mode-desc">适配豆包AI文档<br>统一格式</div>
                            </label>
                            <label class="mode-option">
                                <input type="radio" name="mode" value="general">
                                <div class="mode-icon">🔧</div>
                                <div class="mode-label">通用模式</div>
                                <div class="mode-desc">直接转换<br>保留原格式</div>
                            </label>
                        </div>
                    </div>

                    <!-- Options -->
                    <div class="mode-section">
                        <h3>📋 导出选项</h3>
                        <div class="checkbox-group">
                            <input type="checkbox" id="include-toc">
                            <label for="include-toc">生成目录 (TOC)</label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Preview -->
            <div class="panel preview-panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <span class="icon">👁️</span>
                        预览效果
                    </div>
                    <button class="btn btn-primary" id="export-btn">📥 导出Word</button>
                </div>
                <div class="panel-body" style="padding: 0;">
                    <div class="preview-container">
                        <div id="preview-content" class="preview-content">
                            <div class="empty-preview">
                                <div class="icon">📝</div>
                                <p>粘贴AI文案后点击"导出Word"查看效果</p>
                                <p style="font-size: 0.8rem; margin-top: 0.5rem; opacity: 0.7;">支持 Markdown 格式：标题、加粗、列表、表格等</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="stats-bar">
                    <div class="stat-item">📊 字数: <strong id="stat-words">0</strong></div>
                    <div class="stat-item">🔤 字符: <strong id="stat-chars">0</strong></div>
                    <div class="stat-item">📑 标题: <strong id="stat-headings">0</strong></div>
                    <div class="stat-item">📋 表格: <strong id="stat-tables">0</strong></div>
                </div>
            </div>

            <!-- Template Selection -->
            <div class="panel template-section" style="grid-column: 1 / -1;">
                <div class="panel-header">
                    <div class="panel-title">
                        <span class="icon">🎨</span>
                        模板选择
                    </div>
                    <div class="input-actions">
                        <button class="btn btn-secondary" id="customize-template">⭐ 保存为自定义模板</button>
                    </div>
                </div>
                <div class="panel-body">
                    <div class="template-grid" id="template-grid">
                        <!-- Filled by JS -->
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>AI转Word助手 v3.0 — 纯前端运行，数据安全有保障 · 支持 Office & WPS</p>
        </footer>
    </div>

    <!-- Template Settings Modal -->
    <div class="modal" id="template-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>⚙️ 模板设置</h3>
                <button class="close-btn" id="close-settings">&times;</button>
            </div>

            <!-- Font Settings -->
            <div class="setting-group">
                <label>一级标题字体</label>
                <select id="heading-font">
                    <option value="SimHei">黑体</option>
                    <option value="SimSun">宋体</option>
                    <option value="MicrosoftYaHei">微软雅黑</option>
                    <option value="KaiTi">楷体</option>
                    <option value="FangSong">仿宋</option>
                    <option value="Arial">Arial</option>
                    <option value="Times New Roman">Times New Roman</option>
                </select>
            </div>
            <div class="setting-row">
                <div class="setting-group">
                    <label>一级标题字号 (pt)</label>
                    <input type="number" id="heading-size" value="16" min="6" max="72">
                </div>
                <div class="setting-group">
                    <label>一级标题字体</label>
                    <select id="heading2-font">
                        <option value="KaiTi">楷体</option>
                        <option value="SimHei">黑体</option>
                        <option value="SimSun">宋体</option>
                        <option value="MicrosoftYaHei">微软雅黑</option>
                        <option value="FangSong">仿宋</option>
                        <option value="Arial">Arial</option>
                    </select>
                </div>
            </div>
            <div class="setting-row">
                <div class="setting-group">
                    <label>二级标题字号 (pt)</label>
                    <input type="number" id="heading2-size" value="14" min="6" max="72">
                </div>
                <div class="setting-group">
                    <label>正文字体</label>
                    <select id="body-font">
                        <option value="FangSong">仿宋</option>
                        <option value="SimSun">宋体</option>
                        <option value="MicrosoftYaHei">微软雅黑</option>
                        <option value="SimHei">黑体</option>
                        <option value="KaiTi">楷体</option>
                        <option value="Arial">Arial</option>
                    </select>
                </div>
            </div>
            <div class="setting-group">
                <label>正文字号 (pt)</label>
                <input type="number" id="body-size" value="16" min="6" max="72">
            </div>

            <!-- Spacing -->
            <div class="setting-row">
                <div class="setting-group">
                    <label>行距</label>
                    <input type="number" id="line-spacing" value="28" step="0.1" min="0.5">
                </div>
                <div class="setting-group">
                    <label>行距规则</label>
                    <select id="line-rule">
                        <option value="exact">固定值 (磅)</option>
                        <option value="auto">倍数 (1.5等)</option>
                    </select>
                </div>
            </div>
            <div class="setting-group">
                <label>对齐方式</label>
                <select id="alignment">
                    <option value="justified">两端对齐</option>
                    <option value="left">左对齐</option>
                    <option value="center">居中</option>
                </select>
            </div>

            <!-- Indent -->
            <div class="checkbox-group">
                <input type="checkbox" id="use-indent" checked>
                <label for="use-indent">首行缩进</label>
            </div>
            <div class="setting-group">
                <label>缩进字符数</label>
                <input type="number" id="first-line-indent" value="2" min="0" max="5">
            </div>

            <!-- Save Custom Template -->
            <div style="margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid var(--border);">
                <h4 style="font-size: 0.9rem; margin-bottom: 0.75rem; color: var(--text-secondary);">💾 保存自定义模板</h4>
                <div class="setting-row">
                    <div class="setting-group">
                        <input type="text" id="custom-template-name" placeholder="输入模板名称">
                    </div>
                    <button class="btn btn-secondary" id="add-custom-template-btn" style="flex: 1;">⭐ 保存为新模板</button>
                </div>
            </div>

            <!-- Custom Template List -->
            <div class="template-list" id="template-list">
                <h4 style="font-size: 0.9rem; margin-bottom: 0.75rem; color: var(--text-secondary);">📚 已保存的模板</h4>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" id="reset-template">↩️ 恢复默认</button>
                <button class="btn btn-primary" id="save-template-modal">✅ 应用设置</button>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-spinner"></div>
        <p>正在生成Word文档...</p>
    </div>

    <!-- Scripts -->
    <!-- marked.js 固定版本 v12.0.0 -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <!-- docx.js 固定版本 v8.5.0 -->
    <script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
    <script src="app.js" type="module"></script>
</body>
</html>
