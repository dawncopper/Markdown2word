<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI转Word助手</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/docx@8.2.3/build/index.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">AI转Word助手</div>
            <div class="header-controls">
                <button class="icon-btn" id="theme-toggle" title="切换主题">🌙</button>
                <button class="icon-btn" id="template-settings" title="模板设置">⚙️</button>
            </div>
        </header>

        <main class="app-main">
            <section class="input-section">
                <div class="section-title">
                    <h2>输入AI文案</h2>
                    <div class="input-actions">
                        <button class="btn btn-secondary" id="paste-btn">粘贴</button>
                        <button class="btn btn-secondary" id="upload-btn">上传文件</button>
                        <input type="file" id="file-input" accept=".txt,.md,.docx" style="display:none;">
                    </div>
                </div>
                
                <textarea 
                    id="markdown-input" 
                    class="markdown-input"
                    placeholder="在此粘贴AI生成的Markdown文案...&#10;&#10;支持标题、加粗、列表、表格等Markdown语法"
                    spellcheck="false"
                ></textarea>

                <div class="mode-selector">
                    <h3>转换模式</h3>
                    <div class="mode-options">
                        <label class="mode-option">
                            <input type="radio" name="mode" value="purify" checked>
                            <span class="mode-icon">🧹</span>
                            <span class="mode-label">净化模式</span>
                            <span class="mode-desc">清除特殊符号和多余空行</span>
                        </label>
                        <label class="mode-option">
                            <input type="radio" name="mode" value="rearrange">
                            <span class="mode-icon">📐</span>
                            <span class="mode-label">重排模式</span>
                            <span class="mode-desc">适配豆包AI文档格式</span>
                        </label>
                        <label class="mode-option">
                            <input type="radio" name="mode" value="general">
                            <span class="mode-icon">📝</span>
                            <span class="mode-label">通用模式</span>
                            <span class="mode-desc">标准Markdown转换</span>
                        </label>
                    </div>
                </div>
            </section>

            <section class="template-section">
                <div class="section-title">
                    <h2>选择模板</h2>
                    <button class="btn btn-secondary" id="customize-template">自定义</button>
                </div>
                
                <div class="template-grid">
                    <div class="template-card active" data-template="official">
                        <div class="template-icon">公文</div>
                        <div class="template-name">公文模板</div>
                        <div class="template-desc">党政机关公文格式</div>
                    </div>
                    <div class="template-card" data-template="workplace">
                        <div class="template-icon">职场</div>
                        <div class="template-name">职场模板</div>
                        <div class="template-desc">商务办公文档</div>
                    </div>
                    <div class="template-card" data-template="report">
                        <div class="template-icon">报告</div>
                        <div class="template-name">报告模板</div>
                        <div class="template-desc">数据分析报告</div>
                    </div>
                    <div class="template-card" data-template="custom">
                        <div class="template-icon">自定义</div>
                        <div class="template-name">自定义</div>
                        <div class="template-desc">用户自定义模板</div>
                    </div>
                </div>
            </section>

            <section class="preview-section">
                <div class="section-title">
                    <h2>预览</h2>
                    <button class="btn btn-primary" id="export-btn">导出Word</button>
                </div>
                
                <div class="preview-container">
                    <div id="preview-content" class="preview-content">
                        <div class="empty-preview">
                            <p>粘贴AI文案后点击"导出Word"查看效果</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <div class="modal" id="template-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>模板设置</h3>
                    <button class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="setting-group">
                        <label>标题字体：</label>
                        <select id="heading-font">
                            <option value="SimSun">宋体</option>
                            <option value="SimHei">黑体</option>
                            <option value="KaiTi">楷体</option>
                            <option value="FangSong">仿宋</option>
                            <option value="MicrosoftYaHei">微软雅黑</option>
                        </select>
                    </div>
                    <div class="setting-group">
                        <label>正文字体：</label>
                        <select id="body-font">
                            <option value="SimSun" selected>宋体</option>
                            <option value="SimHei">黑体</option>
                            <option value="KaiTi">楷体</option>
                            <option value="FangSong">仿宋</option>
                            <option value="MicrosoftYaHei">微软雅黑</option>
                        </select>
                    </div>
                    <div class="setting-group">
                        <label>标题字号：</label>
                        <input type="number" id="heading-size" value="16" min="12" max="72">
                    </div>
                    <div class="setting-group">
                        <label>正文字号：</label>
                        <input type="number" id="body-size" value="12" min="8" max="48">
                    </div>
                    <div class="setting-group">
                        <label>行间距：</label>
                        <select id="line-spacing">
                            <option value="1.0">1.0倍</option>
                            <option value="1.5">1.5倍</option>
                            <option value="2.0" selected>2.0倍</option>
                            <option value="2.5">2.5倍</option>
                            <option value="3.0">3.0倍</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" id="reset-template">重置默认</button>
                    <button class="btn btn-primary" id="save-template">保存设置</button>
                </div>
            </div>
        </div>

        <div class="loading-overlay" id="loading-overlay">
            <div class="loading-spinner"></div>
            <p>正在生成Word文档...</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
